[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://ntfy.sh https://api.github.com https://raw.githubusercontent.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://echarts.apache.org; connect-src 'self' https://ntfy.sh https://api.github.com https://raw.githubusercontent.com https://api.anthropic.com; img-src 'self' data: blob: https:; font-src 'self' data: https:; media-src 'self' blob:;"
